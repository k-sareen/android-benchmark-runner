includes:
  - "./lbo-java-base.yml"

modifiers:
  compile_first_use:
    type: JVMArg
    val: "-Xjitthreshold:0"
  mmtk_common:
    type: ModifierSet
    val: "art_common|ignore_max_footprint"
  stress_factor:
    type: ModifierSet
    val: "heap_size-1740M|mmtk_precise_stress-false|mmtk_stress_factor-{0}"
  ss_no_gc_in_harness:
    type: EnvVar
    var: "MMTK_SS_NO_GC_IN_HARNESS"
    val: "{0}"

configs:
  - "art-mmtk-multithreaded|mmtk_common|mmtk_threads-2|mmtk_thread_affinity-4,5|stress_factor-1048576|mmtk_plan-Immix|chroot_mmtk_multi|taskset-c0"
